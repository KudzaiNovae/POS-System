# TillPro full stack — local development & demo deploys.
#
# Usage:
#   docker compose up --build
#   open http://localhost:8080/actuator/health
#
# A volume keeps Postgres data between runs. Reset with:
#   docker compose down -v
#
# Env overrides go in a `.env` file beside this one (DB_PASSWORD, JWT_SECRET).

services:
  db:
    image: postgres:16-alpine
    container_name: tillpro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tillpro}
      POSTGRES_USER: ${POSTGRES_USER:-tillpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tillpro}
    volumes:
      - tillpro_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tillpro} -d ${POSTGRES_DB:-tillpro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tillpro-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-tillpro}
      DB_USER: ${POSTGRES_USER:-tillpro}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-tillpro}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_this_is_only_for_local_development_do_not_ship}
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  tillpro_pg_data:
