spring:
  application:
    name: tillpro-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tillpro}
    username: ${DB_USER:tillpro}
    password: ${DB_PASSWORD:tillpro}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json
  error:
    include-message: always

tillpro:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_this_is_only_for_local_development_do_not_ship}
    expiration-ms: 86400000          # 24h
    refresh-expiration-ms: 2592000000 # 30d

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
