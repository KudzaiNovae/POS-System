name: tillpro
description: TillPro — offline-first POS for small retail shops.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.2+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  uuid: ^4.3.3
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  flutter_secure_storage: ^9.0.0
  collection: ^1.18.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  pdf: ^3.10.8
  printing: ^5.12.0
  qr_flutter: ^4.1.0
  csv: ^6.0.0
  share_plus: ^9.0.0
  mobile_scanner: ^5.1.1
  crypto: ^3.0.3
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
